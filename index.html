<!DOCTYPE html>
<html>

<head>
<title>My Dating App</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f2f2f2;
}

.card{
width:300px;
margin:50px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

img{
width:100%;
border-radius:10px;
}

button{
padding:10px 20px;
margin:10px;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>My Dating App</h1>

<div class="card">

<img src="https://i.pravatar.cc/300">

<h2>Alex, 24</h2>

<p>Loves music and travelling</p>

<button onclick="like()">❤️ Like</button>
<button onclick="pass()">❌ Pass</button>

</div>

<script>

function like(){
alert("You liked this person!");
}

function pass(){
alert("You skipped this profile");
}

</script>

</body>


</html>
